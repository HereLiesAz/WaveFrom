name: Merged Build & Release

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# ⚡ Concurrency: Cancels the entire job if a new push comes in.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject Google Services
        env:
          GOOGLE_SERVICES_API_KEY: ${{ secrets.GOOGLE_SERVICES_API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: |
          if [ -f "app/google-services.json.template" ]; then
            echo "Template found. Injecting secrets..."
            sed -e 's/{{\([^}]*\)}}/${\1}/g' app/google-services.json.template | envsubst > app/google-services.json
          else
            echo "Warning: google-services.json.template not found. Skipping injection."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          KEYSTORE_RAW: ${{ secrets.KEYSTORE_RAW }}
        run: echo "$KEYSTORE_RAW" | base64 -d > "${{ github.workspace }}/release.jks"

      - name: Build with Gradle
        id: gradle-build
        env:
          # Signing is applied by app/build.gradle.kts only when the keystore exists,
          # so on PRs/feature branches (no decode step) the release stays unsigned.
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set +e
          # Versioning is computed in Gradle (app/build.gradle.kts); a single Gradle
          # invocation = exactly one version bump. On the default branch we build the
          # signed release AAB + APK; elsewhere just the (unsigned) debug APK. Tests
          # gate the build, so a regression fails CI and is reported to Jules below.
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "main" ]; then
            TASKS="testDebugUnitTest bundleRelease assembleRelease"
          else
            TASKS="testDebugUnitTest assembleDebug"
          fi
          ./gradlew $TASKS --build-cache > build.log 2>&1

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          cat build.log
          exit $EXIT_CODE

      # ------------------------------------------------------------------
      # FAILURE HANDLING
      # ------------------------------------------------------------------
      - name: Report Failure to Jules
        if: failure() && steps.gradle-build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let logTail = 'Log file not found.';
            try { logTail = fs.readFileSync('build.log', 'utf8').slice(-4000); } catch (e) {}
            
            const assignee = 'gemini-code-assist';
            
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Build Failure on ${context.eventName === 'pull_request' ? 'PR #' + context.issue.number : context.ref}`,
                body: `@${assignee} /jules debug this build error\n\n**Log:**\n\`\`\`\n${logTail}\n\`\`\``,
                labels: ['jules', 'bug'],
                assignees: [assignee]
              });
            } catch (error) {
              console.log("Failed to create issue with assignee. Retrying without assignee.");
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Build Failure on ${context.eventName === 'pull_request' ? 'PR #' + context.issue.number : context.ref}`,
                body: `@${assignee} /jules debug this build error\n\n**Log:**\n\`\`\`\n${logTail}\n\`\`\``,
                labels: ['jules', 'bug']
              });
            }

      # ------------------------------------------------------------------
      # RELEASE (only on push to the default branch). Versioning is owned by
      # Gradle; we read it back here, sign, publish, and persist the bump.
      # ------------------------------------------------------------------
      - name: Read version + stage artifacts
        if: success() && github.event_name == 'push' && github.ref_name == 'main'
        run: |
          NAME=$(./gradlew -q printVersionName 2>/dev/null | tail -1)
          CODE=$(./gradlew -q printVersionCode 2>/dev/null | tail -1)
          APP_NAME=$(grep 'rootProject.name' settings.gradle.kts | sed -E "s/.*=.*[\"'](.*)[\"']/\1/")
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$AAB" ] || [ -z "$APK" ]; then echo "Missing signed release artifacts"; exit 1; fi
          cp "$AAB" "${APP_NAME}-${NAME}.aab"
          cp "$APK" "${APP_NAME}-${NAME}.apk"
          {
            echo "VERSION_NAME=$NAME"
            echo "VERSION_CODE=$CODE"
            echo "TAG_NAME=v$NAME"
            echo "AAB_FILE=${APP_NAME}-${NAME}.aab"
            echo "APK_FILE=${APP_NAME}-${NAME}.apk"
          } >> $GITHUB_ENV

      - name: Persist version bump
        if: success() && github.event_name == 'push' && github.ref_name == 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties
          # [skip ci] stops this push from re-triggering the workflow (no publish loop).
          git commit -m "chore: release ${VERSION_NAME} (versionCode ${VERSION_CODE}) [skip ci]" \
            || { echo "no version change to commit"; exit 0; }
          # Non-fatal: if main is branch-protected and rejects the bot push, warn rather
          # than fail the release. (For the build counter to persist/never-reset across
          # runs, the actions bot needs push access to main.)
          git push origin HEAD:main \
            || echo "::warning::version bump push rejected — versionCode may not persist (branch protection?)"

      - name: Publish GitHub release (signed AAB + APK)
        if: success() && github.event_name == 'push' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # versionName is unique per build (patch increments), so the tag is always new.
          gh release create "$TAG_NAME" "$APK_FILE" "$AAB_FILE" \
            --title "WaveFrom $VERSION_NAME" \
            --notes "Signed release $VERSION_NAME (versionCode $VERSION_CODE) from ${GITHUB_SHA}." \
            --target "$GITHUB_SHA"

      - name: Upload AAB to Google Play (internal track)
        if: success() && github.event_name == 'push' && github.ref_name == 'main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hereliesaz.wavefrom
          releaseFiles: ${{ env.AAB_FILE }}
          track: internal
          status: completed

  # --------------------------------------------------------------------------
  # Instrumented smoke test on an emulator. Deliberately decoupled from
  # build-and-release (no needs:) so emulator flake can never block an APK
  # release. Runs only on PRs and manual dispatch, not on every push.
  # --------------------------------------------------------------------------
  instrumented:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        api-level: [30]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          # Cold boot (-no-snapshot) instead of an AVD-cache snapshot restore: the
          # snapshot path flips sys.boot_completed before the system services are up,
          # so the runner's post-boot wake keyevent crashed with "No service published
          # for: input". A cold boot waits for a fully-ready system. Slower, but this
          # job is decoupled from the release so reliability beats speed.
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest
